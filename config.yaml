input:
  # Keep the real source list in sources.csv. It is ignored by Git.
  sources_file: "sources.csv"

database:
  # Collected data stays local because data/ is ignored by Git.
  path: "data/telegram_research.sqlite"

scraping:
  posts_per_channel: 100
  comments_per_post: 100
  scrape_comments: true

  # Optional ISO dates, for example "2026-01-01".
  after_date: null
  before_date: null

  # Optional Telegram text search. Use null to collect all matching posts.
  keyword_filter: null
  include_posts_without_text: false

  # Random delay between requests.
  min_delay_seconds: 0.5
  max_delay_seconds: 1.5

  # false waits for Telegram's requested delay and continues.
  stop_on_flood_wait: false

privacy:
  # HMAC pseudonyms are stable only when ANONYMIZATION_SALT stays unchanged.
  hash_sender_ids: true
  save_sender_ids: false
  save_usernames: false

export:
  output_dir: "exports"
